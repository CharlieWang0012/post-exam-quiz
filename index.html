<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>郵政三法＋金融科技 選擇題練習</title>
<style>
:root{
  --bg:#0f1720; --card:#16212e; --card2:#1d2a3a; --line:#2b3a4d;
  --txt:#e6edf3; --sub:#9fb0c3; --accent:#3b82f6; --accent2:#2563eb;
  --ok:#22c55e; --okbg:#10331f; --no:#ef4444; --nobg:#3a1717; --warn:#f59e0b;
  --tag1:#1e3a5f; --tag2:#4a2e1e;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
  font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
  line-height:1.7;font-size:17px}
.wrap{max-width:760px;margin:0 auto;padding:18px 16px 60px}
h1{font-size:1.35rem;margin:.2em 0 .1em}
.muted{color:var(--sub);font-size:.9rem}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin:14px 0}
.btn{display:inline-block;border:0;border-radius:10px;padding:11px 16px;font-size:1rem;
  font-family:inherit;cursor:pointer;background:var(--accent);color:#fff;font-weight:600}
.btn:hover{background:var(--accent2)}
.btn.big{width:100%;padding:15px;font-size:1.1rem;margin-top:8px}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--txt);font-weight:500}
.btn.ghost:hover{background:var(--card2)}
.btn:disabled{opacity:.5;cursor:default}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(135px,1fr));gap:9px}
.chip{background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:12px 10px;
  cursor:pointer;text-align:center;font-size:.95rem;transition:.12s}
.chip:hover{border-color:var(--accent)}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700}
.chip small{display:block;color:var(--sub);font-size:.78rem;margin-top:2px}
.chip.on small{color:#dbeafe}
.row{display:flex;gap:9px;flex-wrap:wrap;align-items:center}
.row.sb{justify-content:space-between}
.toggle{display:flex;align-items:center;gap:7px;background:var(--card2);border:1px solid var(--line);
  border-radius:10px;padding:9px 12px;cursor:pointer;font-size:.92rem}
.toggle input{width:18px;height:18px;accent-color:var(--accent)}
.tag{display:inline-block;font-size:.76rem;padding:2px 9px;border-radius:20px;margin-right:6px}
.tag.y{background:var(--tag1);color:#bcd4ff}
.tag.c{background:var(--tag2);color:#ffd9b3}
.bar{height:7px;background:var(--card2);border-radius:6px;overflow:hidden;margin:10px 0}
.bar>i{display:block;height:100%;background:var(--accent);transition:width .25s}
.q-stem{font-size:1.12rem;font-weight:600;margin:6px 0 16px;line-height:1.75}
.opt{display:flex;gap:11px;align-items:flex-start;background:var(--card2);border:1.5px solid var(--line);
  border-radius:11px;padding:13px 14px;margin:9px 0;cursor:pointer;transition:.12s}
.opt:hover{border-color:var(--accent)}
.opt .lab{flex:0 0 26px;height:26px;border-radius:50%;background:#27384c;color:var(--txt);
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.9rem}
.opt.sel{border-color:var(--accent);background:#16314f}
.opt.sel .lab{background:var(--accent);color:#fff}
.opt.ok{border-color:var(--ok);background:var(--okbg)}
.opt.ok .lab{background:var(--ok);color:#04210f}
.opt.no{border-color:var(--no);background:var(--nobg)}
.opt.no .lab{background:var(--no);color:#2a0808}
.opt.dis{cursor:default}
.fb{font-weight:700;margin:6px 0}
.fb.ok{color:var(--ok)} .fb.no{color:var(--no)}
.nav{display:flex;gap:10px;margin-top:18px}
.nav .btn{flex:1}
.timer{font-variant-numeric:tabular-nums;color:var(--sub);font-size:.92rem}
.big-score{font-size:3.2rem;font-weight:800;text-align:center;margin:4px 0}
.score-sub{text-align:center;color:var(--sub);margin-bottom:8px}
.statline{display:flex;justify-content:space-between;font-size:.92rem;margin:9px 0 3px}
.rev{border-top:1px solid var(--line);padding:13px 0;font-size:.97rem}
.rev .ystem{font-weight:600;margin:4px 0 8px}
.rev .o{padding:3px 0 3px 10px;border-left:3px solid var(--line);margin:3px 0}
.rev .o.ok{border-color:var(--ok);color:#9be8b4}
.rev .o.no{border-color:var(--no);color:#f3a3a3}
.hide{display:none}
.center{text-align:center}
a.link{color:#79b8ff}
.footer{color:var(--sub);font-size:.8rem;text-align:center;margin-top:30px}
.kbd{background:var(--card2);border:1px solid var(--line);border-radius:5px;padding:1px 6px;font-size:.82rem}
</style>
</head>
<body>
<div class="wrap">

<!-- ===== 首頁 ===== -->
<section id="home">
  <h1>📮 郵政三法＋金融科技 · 選擇題練習</h1>
  <div class="muted">中華郵政 專業職(一)程式設計｜112–114 年共 180 題官方真題（含正解）</div>

  <div class="card">
    <div class="muted" style="margin-bottom:8px">① 選範圍</div>
    <div class="grid" id="scopeGrid"></div>
  </div>

  <div class="card">
    <div class="muted" style="margin-bottom:8px">② 選模式</div>
    <div class="row">
      <div class="chip on" data-mode="practice" style="flex:1" onclick="pickMode(this,'practice')">
        練習模式<small>作答即顯示對錯＋正解</small></div>
      <div class="chip" data-mode="exam" style="flex:1" onclick="pickMode(this,'exam')">
        測驗模式<small>計時，最後一次結算</small></div>
    </div>
    <div class="row" style="margin-top:10px">
      <label class="toggle"><input type="checkbox" id="shufQ" checked>題目隨機順序</label>
      <label class="toggle"><input type="checkbox" id="shufO">打亂選項順序</label>
    </div>
    <div class="row" style="margin-top:10px">
      <span class="muted">題數：</span>
      <div class="chip on" data-n="0" onclick="pickN(this,0)" style="flex:1">全部</div>
      <div class="chip" data-n="20" onclick="pickN(this,20)" style="flex:1">20</div>
      <div class="chip" data-n="40" onclick="pickN(this,40)" style="flex:1">40</div>
    </div>
  </div>

  <button class="btn big" onclick="start()">開始練習 ▶</button>
  <div class="footer">資料來源：台灣金融研訓院官方歷屆試題。錯題本會存在這台裝置的瀏覽器。</div>
</section>

<!-- ===== 答題 ===== -->
<section id="quiz" class="hide">
  <div class="row sb">
    <div><span id="qScope" class="muted"></span></div>
    <div class="row" style="gap:12px">
      <span class="timer" id="timer"></span>
      <button class="btn ghost" style="padding:6px 11px" onclick="quitQuiz()">結束</button>
    </div>
  </div>
  <div class="bar"><i id="prog"></i></div>
  <div class="muted" id="qCount" style="margin-bottom:4px"></div>
  <div class="card">
    <div><span class="tag y" id="qYear"></span><span class="tag c" id="qCat"></span></div>
    <div class="q-stem" id="qStem"></div>
    <div id="qOpts"></div>
    <div id="qFb"></div>
  </div>
  <div class="nav">
    <button class="btn ghost" id="prevBtn" onclick="go(-1)">‹ 上一題</button>
    <button class="btn" id="nextBtn" onclick="go(1)">下一題 ›</button>
  </div>
  <div class="footer">鍵盤：<span class="kbd">1</span>~<span class="kbd">4</span> 作答　<span class="kbd">←</span>/<span class="kbd">→</span> 換題</div>
</section>

<!-- ===== 結算 ===== -->
<section id="result" class="hide">
  <div class="card">
    <div class="big-score" id="scoreNum"></div>
    <div class="score-sub" id="scoreSub"></div>
    <div id="catStats"></div>
  </div>
  <div class="row">
    <button class="btn" style="flex:1" id="redoWrong" onclick="redoWrong()">重做本次錯題</button>
    <button class="btn ghost" style="flex:1" onclick="home()">回首頁</button>
  </div>
  <div class="card">
    <div class="row sb"><strong>錯題檢討</strong><span class="muted" id="wrongCount"></span></div>
    <div id="reviewList"></div>
  </div>
</section>

</div>
<script>

const CATS = ['郵政法','郵政儲金匯兌法','簡易人壽保險法','金融科技'];
const LS_WRONG = 'post_quiz_wrongbook_v1';

function getWrongbook(){ try{return new Set(JSON.parse(localStorage.getItem(LS_WRONG)||'[]'))}catch(e){return new Set()} }
function saveWrongbook(s){ localStorage.setItem(LS_WRONG, JSON.stringify([...s])) }

// ---- 首頁狀態 ----
let mode='practice', limitN=0;
let scope={key:'all',label:'全部',filter:q=>true};

function buildScopes(){
  const wb=getWrongbook();
  const defs=[
    {key:'all',label:'全部',sub:'180 題',f:q=>true},
    {key:'law',label:'郵政三法',sub:'90 題',f:q=>q.grp==='郵政三法'},
    {key:'fin',label:'金融科技',sub:'90 題',f:q=>q.cat==='金融科技'},
    {key:'c1',label:'郵政法',sub:'30 題',f:q=>q.cat==='郵政法'},
    {key:'c2',label:'儲金匯兌法',sub:'30 題',f:q=>q.cat==='郵政儲金匯兌法'},
    {key:'c3',label:'簡易壽險法',sub:'30 題',f:q=>q.cat==='簡易人壽保險法'},
    {key:'y114',label:'114 年',sub:'60 題',f:q=>q.yr==='114'},
    {key:'y113',label:'113 年',sub:'60 題',f:q=>q.yr==='113'},
    {key:'y112',label:'112 年',sub:'60 題',f:q=>q.yr==='112'},
    {key:'wrong',label:'★ 錯題本',sub:wb.size+' 題',f:q=>wb.has(q.id)},
  ];
  const g=document.getElementById('scopeGrid'); g.innerHTML='';
  defs.forEach((d,i)=>{
    const el=document.createElement('div');
    el.className='chip'+(i===0?' on':'');
    el.innerHTML=d.label+'<small>'+d.sub+'</small>';
    el.onclick=()=>{ [...g.children].forEach(c=>c.classList.remove('on')); el.classList.add('on');
      scope={key:d.key,label:d.label,filter:d.f}; };
    g.appendChild(el);
  });
}
function pickMode(el,m){ mode=m; [...el.parentNode.children].forEach(c=>c.classList.remove('on')); el.classList.add('on'); }
function pickN(el,n){ limitN=n; [...el.parentNode.children].forEach(c=>c.classList.remove('on')); el.classList.add('on'); }

// ---- 出題 ----
let pool=[], cur=0, answers=[], startTime=0, timerId=null;

function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];} return a; }

function start(){
  let qs=QUESTIONS.filter(scope.filter);
  if(qs.length===0){ alert('這個範圍目前沒有題目（錯題本可能是空的）。'); return; }
  if(document.getElementById('shufQ').checked) qs=shuffle(qs);
  if(limitN>0) qs=qs.slice(0,limitN);
  const shufO=document.getElementById('shufO').checked;
  pool=qs.map(q=>{
    let order=[0,1,2,3];
    if(shufO) order=shuffle(order);
    return {q, order, ansIdx:order.indexOf(q.ans-1), picked:null};
  });
  answers=new Array(pool.length).fill(null);
  cur=0;
  show('quiz');
  document.getElementById('qScope').textContent=scope.label+'（'+mode==='exam'?'測驗':'練習'+'）';
  document.getElementById('qScope').textContent=scope.label+'　'+(mode==='exam'?'測驗模式':'練習模式');
  if(mode==='exam'){ startTime=Date.now(); timerId=setInterval(updTimer,1000); updTimer(); }
  else { document.getElementById('timer').textContent=''; }
  render();
}
function updTimer(){
  const s=Math.floor((Date.now()-startTime)/1000);
  const m=String(Math.floor(s/60)).padStart(2,'0'), ss=String(s%60).padStart(2,'0');
  document.getElementById('timer').textContent='⏱ '+m+':'+ss;
}

function render(){
  const it=pool[cur], q=it.q;
  document.getElementById('prog').style.width=((cur+1)/pool.length*100)+'%';
  document.getElementById('qCount').textContent='第 '+(cur+1)+' / '+pool.length+' 題';
  document.getElementById('qYear').textContent=q.yr+' 年';
  document.getElementById('qCat').textContent=q.cat;
  document.getElementById('qStem').textContent=q.stem;
  const box=document.getElementById('qOpts'); box.innerHTML='';
  const labels=['A','B','C','D'];
  const answered = it.picked!==null;
  it.order.forEach((origIdx,pos)=>{
    const el=document.createElement('div'); el.className='opt';
    el.innerHTML='<div class="lab">'+labels[pos]+'</div><div>'+q.opts[origIdx]+'</div>';
    if(mode==='practice' && answered){
      el.classList.add('dis');
      if(pos===it.ansIdx) el.classList.add('ok');
      else if(pos===it.picked) el.classList.add('no');
    } else if(mode==='exam' && it.picked===pos){
      el.classList.add('sel');
    }
    el.onclick=()=>pick(pos);
    box.appendChild(el);
  });
  const fb=document.getElementById('qFb'); fb.innerHTML='';
  if(mode==='practice' && answered){
    const ok=it.picked===it.ansIdx;
    fb.innerHTML='<div class="fb '+(ok?'ok':'no')+'">'+(ok?'✓ 答對！':'✗ 答錯　正解：'+labels[it.ansIdx])+'</div>';
  }
  document.getElementById('prevBtn').disabled = cur===0;
  const nb=document.getElementById('nextBtn');
  nb.textContent = (cur===pool.length-1)?'交卷 ✅':'下一題 ›';
}

function pick(pos){
  const it=pool[cur];
  if(mode==='practice'){
    if(it.picked!==null) return;          // 練習模式作答後鎖定
    it.picked=pos; answers[cur]=pos;
    if(it.picked!==it.ansIdx){ const wb=getWrongbook(); wb.add(it.q.id); saveWrongbook(wb); }
    render();
  } else {
    it.picked=pos; answers[cur]=pos; render();   // 測驗模式可改
  }
}
function go(d){
  if(d>0 && cur===pool.length-1){ finish(); return; }
  cur=Math.max(0,Math.min(pool.length-1,cur+d)); render();
}
document.addEventListener('keydown',e=>{
  if(document.getElementById('quiz').classList.contains('hide')) return;
  if(['1','2','3','4'].includes(e.key)) pick(+e.key-1);
  else if(e.key==='ArrowLeft') go(-1);
  else if(e.key==='ArrowRight') go(1);
});

function finish(){
  if(timerId){ clearInterval(timerId); timerId=null; }
  // 測驗模式結束才結算錯題本
  if(mode==='exam'){ const wb=getWrongbook();
    pool.forEach(it=>{ if(it.picked!==it.ansIdx) wb.add(it.q.id); else wb.delete(it.q.id); });
    saveWrongbook(wb);
  } else { // 練習模式：答對的從錯題本移除
    const wb=getWrongbook();
    pool.forEach(it=>{ if(it.picked===it.ansIdx) wb.delete(it.q.id); });
    saveWrongbook(wb);
  }
  let correct=0; const perCat={};
  CATS.forEach(c=>perCat[c]={t:0,c:0});
  pool.forEach(it=>{
    const ok=it.picked===it.ansIdx; if(ok)correct++;
    const c=it.q.cat; perCat[c].t++; if(ok)perCat[c].c++;
  });
  const total=pool.length, pct=Math.round(correct/total*100);
  document.getElementById('scoreNum').textContent=pct+'分';
  let sub='答對 '+correct+' / '+total+' 題';
  if(mode==='exam'){ const s=Math.floor((Date.now()-startTime)/1000);
    sub+='　用時 '+Math.floor(s/60)+'分'+(s%60)+'秒'; }
  document.getElementById('scoreSub').textContent=sub;
  const cs=document.getElementById('catStats'); cs.innerHTML='';
  CATS.forEach(c=>{ const o=perCat[c]; if(o.t===0)return;
    const p=Math.round(o.c/o.t*100);
    cs.innerHTML+='<div class="statline"><span>'+c+'</span><span>'+o.c+'/'+o.t+'　'+p+'%</span></div>'+
      '<div class="bar"><i style="width:'+p+'%;background:'+(p>=80?'var(--ok)':p>=60?'var(--warn)':'var(--no)')+'"></i></div>';
  });
  // 錯題檢討
  const wrong=pool.filter(it=>it.picked!==it.ansIdx);
  document.getElementById('wrongCount').textContent=wrong.length+' 題';
  document.getElementById('redoWrong').disabled = wrong.length===0;
  const rl=document.getElementById('reviewList'); rl.innerHTML='';
  const labels=['A','B','C','D'];
  if(wrong.length===0){ rl.innerHTML='<div class="muted center" style="padding:14px">🎉 全部答對，沒有錯題！</div>'; }
  wrong.forEach(it=>{
    const q=it.q; let h='<div class="rev"><div><span class="tag y">'+q.yr+'年</span><span class="tag c">'+q.cat+'</span></div>';
    h+='<div class="ystem">'+q.stem+'</div>';
    it.order.forEach((origIdx,pos)=>{
      let cls=''; let mark='';
      if(pos===it.ansIdx){ cls='ok'; mark='　✓ 正解'; }
      else if(pos===it.picked){ cls='no'; mark='　✗ 你選的'; }
      h+='<div class="o '+cls+'">'+labels[pos]+'. '+q.opts[origIdx]+mark+'</div>';
    });
    h+='</div>'; rl.innerHTML+=h;
  });
  show('result');
  window.scrollTo(0,0);
}

let lastWrongIds=null;
function redoWrong(){
  const wrong=pool.filter(it=>it.picked!==it.ansIdx).map(it=>it.q.id);
  if(wrong.length===0)return;
  const set=new Set(wrong);
  scope={key:'redo',label:'本次錯題',filter:q=>set.has(q.id)};
  // 強制不裁切題數
  limitN=0;
  document.getElementById('shufQ').checked=true;
  start();
}
function quitQuiz(){ if(confirm('結束本次練習並查看結算？')) finish(); }
function home(){ if(timerId){clearInterval(timerId);timerId=null;} buildScopes(); show('home'); }
function show(id){ ['home','quiz','result'].forEach(s=>document.getElementById(s).classList.toggle('hide',s!==id)); }

buildScopes();
</script>
